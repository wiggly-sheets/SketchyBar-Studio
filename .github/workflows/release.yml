name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package universal app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build universal app bundle
        run: bash ./script/build_and_run.sh --universal-package

      - name: Verify universal binary
        run: |
          file dist/SketchyBarStudio.app/Contents/MacOS/SketchyBarStudio
          lipo dist/SketchyBarStudio.app/Contents/MacOS/SketchyBarStudio -verify_arch arm64 x86_64

      - name: Zip app
        run: ditto -c -k --keepParent dist/SketchyBarStudio.app SketchyBarStudio-universal.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SketchyBarStudio-universal-app
          path: SketchyBarStudio-universal.app.zip
