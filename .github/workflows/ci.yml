name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Clean SwiftPM cache for workspace
        run: swift package clean

      - name: Build
        run: swift build

      - name: Package app bundle
        run: bash ./script/build_and_run.sh --package

      - name: Verify app bundle metadata
        run: |
          test -x dist/SketchyBarStudio.app/Contents/MacOS/SketchyBarStudio
          test -f dist/SketchyBarStudio.app/Contents/Resources/SketchyBarStudio.icns
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIconFile' dist/SketchyBarStudio.app/Contents/Info.plist | grep SketchyBarStudio
